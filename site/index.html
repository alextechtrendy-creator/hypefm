<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>hype.fm — Spaces about Hyperliquid</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="A community archive of X Spaces about Hyperliquid. Audio, transcripts, key moments, fully searchable.">
<style>
  :root {
    --bg: #fafaf7;
    --bg-card: #ffffff;
    --fg: #222;
    --fg-muted: #777;
    --fg-faint: #999;
    --accent: #0d6856;
    --accent-light: #97FCE4;
    --accent-bg: rgba(13, 104, 86, 0.1);
    --quote-bg: #043b30;
    --quote-fg: #fafaf7;
    --border: #d4d2c5;
    --border-light: #e5e5e0;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Verdana, Geneva, sans-serif;
    background: var(--bg); color: var(--fg);
    margin: 0; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1080px; margin: 0 auto; padding: 1.75rem 1.5rem 4rem; }
  header {
    margin-bottom: 1rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border-light);
    display: flex; align-items: baseline; justify-content: space-between;
  }
  h1 {
    font-size: 16px; font-weight: 500; margin: 0; letter-spacing: -0.01em;
  }
  .tagline { font-size: 11px; color: var(--fg-faint); font-weight: 400; margin-left: 4px; }
  .count { font-size: 11px; color: var(--accent); font-weight: 500; margin: 0; }
  .search-wrap { margin-bottom: 0.75rem; }
  #search {
    width: 100%; padding: 9px 13px;
    background: white; border: 1px solid var(--border);
    border-radius: 4px; color: var(--fg);
    font-size: 12px; font-family: inherit; outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--fg-faint); }
  .active-filter {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 0.75rem; font-size: 11px;
  }
  .active-filter-label { color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .active-filter-pill {
    background: var(--accent); color: white; font-weight: 500;
    padding: 3px 10px; border-radius: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer; font-size: 11px; border: none; font-family: inherit;
  }
  .filters {
    font-size: 11px; color: var(--fg-muted);
    margin-bottom: 1.5rem; line-height: 1.9;
  }
  .chip {
    background: none; border: none; padding: 0;
    font-family: inherit; font-size: 11px; color: var(--fg-muted);
    cursor: pointer;
  }
  .chip:hover { color: var(--fg); }
  .chip.active { color: var(--accent); font-weight: 500; }
  .chip-sep { color: #ddd; margin: 0 5px; }
  .results { display: flex; flex-direction: column; gap: 16px; }
  .entry {
    text-decoration: none; color: inherit; display: block;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: border-color 0.1s;
  }
  .entry:hover { border-color: var(--accent); }
  .entry-thumb {
    background: var(--quote-bg);
    padding: 28px 24px;
    min-height: 150px;
    display: flex; flex-direction: column;
    justify-content: center; gap: 18px;
  }
  .entry-thumb-quote {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 19px;
    color: var(--quote-fg);
    line-height: 1.3;
    margin: 0;
    font-weight: 500;
  }
  .entry-thumb-fallback {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(250, 250, 247, 0.7);
    line-height: 1.4;
    margin: 0;
  }
  .byline {
    display: flex; align-items: baseline; gap: 8px;
    flex-wrap: wrap;
    font-size: 13px; line-height: 1.4;
    border-top: 1px solid rgba(151, 252, 228, 0.18);
    padding-top: 14px;
  }
  .byline-name { color: var(--quote-fg); font-weight: 600; }
  .byline-role { color: rgba(151, 252, 228, 0.85); font-size: 12px; }
  .byline-sep { color: rgba(151, 252, 228, 0.4); }
  .byline-team {
    display: inline-flex; align-items: center;
    background: rgba(151, 252, 228, 0.12);
    border: 1px solid rgba(151, 252, 228, 0.3);
    color: var(--accent-light); font-weight: 500;
    padding: 3px 10px; border-radius: 12px;
    text-decoration: none; font-size: 12px;
    cursor: pointer; font-family: inherit;
    transition: background 0.1s;
  }
  .byline-team:hover {
    background: rgba(151, 252, 228, 0.22);
    border-color: rgba(151, 252, 228, 0.5);
  }
  .entry-body { padding: 14px 18px 16px; }
  .entry-title {
    font-size: 17px; font-weight: 500;
    margin: 0; line-height: 1.3; letter-spacing: -0.01em;
    color: var(--fg);
  }
  .entry:hover .entry-title { color: var(--accent); }
  .entry-desc {
    font-size: 12px; color: var(--fg-muted);
    margin: 8px 0 0; line-height: 1.5;
  }
  .entry-meta {
    font-size: 11px; color: #888;
    margin: 10px 0 0;
  }
  .entry-meta .tag {
    color: var(--accent); font-weight: 500;
    cursor: pointer; background: none; border: none; padding: 0;
    font-family: inherit; font-size: inherit;
  }
  .entry-meta .tag:hover { text-decoration: underline; }
  .snippet {
    margin: 10px 0 0; font-size: 11px; color: var(--fg-muted);
    line-height: 1.5; padding-left: 10px;
    border-left: 2px solid var(--border-light);
  }
  mark { background: var(--accent-bg); color: var(--accent); padding: 0 1px; border-radius: 2px; }
  .empty { color: var(--fg-muted); padding: 2rem 0; text-align: center; font-size: 12px; }
  footer {
    margin-top: 3rem; padding-top: 1rem;
    border-top: 1px solid var(--border-light);
    color: var(--fg-faint); font-size: 11px; text-align: center;
  }
  footer a { color: var(--fg-muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }
  @media (max-width: 600px) {
    .entry-thumb { padding: 22px 18px; min-height: 120px; gap: 14px; }
    .entry-thumb-quote { font-size: 16px; }
    .entry-title { font-size: 15px; }
    .byline { font-size: 12px; padding-top: 10px; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>hype.fm<span class="tagline"> — spaces about hyperliquid</span></h1>
  <p class="count" id="count">loading...</p>
</header>

<div class="search-wrap">
  <input id="search" type="text" placeholder="search across transcripts" autocomplete="off">
</div>

<div id="active-filters"></div>

<div class="filters" id="filters"></div>

<div class="results" id="results"></div>

<footer>
  <a href="https://x.com/i/lists/hyperliquid">a community project</a> &nbsp;·&nbsp;
  <a href="mailto:takedown@hypefm.xyz">takedown requests</a>
</footer>

</div>

<script src="https://unpkg.com/lunr@2.3.9/lunr.min.js"></script>
<script>
(function() {
  const state = { spaces: [], index: null, activeHost: null, activeTag: null, activeTeam: null, query: '' };
  const els = {
    search: document.getElementById('search'),
    filters: document.getElementById('filters'),
    activeFilters: document.getElementById('active-filters'),
    results: document.getElementById('results'),
    count: document.getElementById('count'),
  };

  // Read URL params on load
  const params = new URLSearchParams(window.location.search);
  if (params.get('tag')) state.activeTag = params.get('tag');
  if (params.get('team')) state.activeTeam = params.get('team');
  if (params.get('host')) state.activeHost = params.get('host');

  function fmtDuration(s) {
    if (!s) return '';
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
    return h ? h + 'h ' + m + 'm' : m + 'm';
  }
  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }).toLowerCase();
  }
  function esc(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function hl(text, query) {
    if (!query) return esc(text);
    const escaped = esc(text);
    const terms = query.trim().split(/\s+/).filter(t => t.length >= 2);
    if (!terms.length) return escaped;
    const pattern = new RegExp('(' + terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')', 'gi');
    return escaped.replace(pattern, '<mark>$1</mark>');
  }
  function snippet(t, q) {
    if (!t || !q) return null;
    const terms = q.trim().toLowerCase().split(/\s+/).filter(x => x.length >= 2);
    if (!terms.length) return null;
    const lower = t.toLowerCase();
    let bestPos = -1;
    for (const term of terms) {
      const pos = lower.indexOf(term);
      if (pos !== -1 && (bestPos === -1 || pos < bestPos)) bestPos = pos;
    }
    if (bestPos === -1) return null;
    const start = Math.max(0, bestPos - 60);
    const end = Math.min(t.length, bestPos + 180);
    let s = t.slice(start, end);
    if (start > 0) s = '…' + s;
    if (end < t.length) s = s + '…';
    return s;
  }
  function renderActiveFilters() {
    const parts = [];
    if (state.activeTeam) {
      parts.push('<span class="active-filter-label">team</span>');
      parts.push(`<button class="active-filter-pill" data-clear="team">${esc(state.activeTeam)} ✕</button>`);
    }
    if (state.activeTag) {
      parts.push('<span class="active-filter-label">topic</span>');
      parts.push(`<button class="active-filter-pill" data-clear="tag">${esc(state.activeTag)} ✕</button>`);
    }
    if (state.activeHost) {
      parts.push('<span class="active-filter-label">host</span>');
      parts.push(`<button class="active-filter-pill" data-clear="host">@${esc(state.activeHost)} ✕</button>`);
    }
    els.activeFilters.innerHTML = parts.length
      ? '<div class="active-filter">' + parts.join('') + '</div>'
      : '';
    els.activeFilters.querySelectorAll('[data-clear]').forEach(btn => {
      btn.addEventListener('click', () => {
        const what = btn.dataset.clear;
        if (what === 'team') state.activeTeam = null;
        if (what === 'tag') state.activeTag = null;
        if (what === 'host') state.activeHost = null;
        renderAll();
      });
    });
  }
  function render() {
    let filtered = state.spaces;
    if (state.activeHost) filtered = filtered.filter(s => s.host === state.activeHost);
    if (state.activeTag) filtered = filtered.filter(s => (s.tags || []).includes(state.activeTag));
    if (state.activeTeam) {
      filtered = filtered.filter(s => {
        const attrTeam = s.quote_attribution && s.quote_attribution.team;
        const partTeams = (s.participants || []).map(p => p.team).filter(Boolean);
        return attrTeam === state.activeTeam || partTeams.includes(state.activeTeam);
      });
    }
    if (state.query && state.index) {
      const q = state.query.trim();
      let results = [];
      try { results = state.index.search(q + '*'); }
      catch (e) {
        const lq = q.toLowerCase();
        results = state.spaces
          .filter(s => (s.title || '').toLowerCase().includes(lq) || (s._transcript || '').toLowerCase().includes(lq))
          .map(s => ({ ref: s.id }));
      }
      const matchedIds = new Set(results.map(r => r.ref));
      filtered = filtered.filter(s => matchedIds.has(s.id));
    }
    filtered.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    els.count.textContent = filtered.length + ' space' + (filtered.length === 1 ? '' : 's');
    if (!filtered.length) {
      els.results.innerHTML = '<div class="empty">no spaces match your search.</div>';
      return;
    }
    els.results.innerHTML = filtered.map(s => {
      const sn = state.query ? snippet(s._transcript, state.query) : null;
      const meta = [];
      if (s.host) meta.push('@' + esc(s.host));
      if (s.date) meta.push(esc(fmtDate(s.date)));
      if (s.duration) meta.push(esc(fmtDuration(s.duration)));
      if (s.tags && s.tags.length) {
        const tagButtons = s.tags.map(t => `<button class="tag" data-tag="${esc(t)}">${esc(t)}</button>`).join(', ');
        meta.push(tagButtons);
      }
      if (!s.audio) meta.push('transcript only');

      // Quote panel content
      let thumbContent;
      if (s.quote) {
        thumbContent = `<p class="entry-thumb-quote">"${esc(s.quote)}"</p>`;
        const attr = s.quote_attribution;
        if (attr && attr.name) {
          const parts = [`<span class="byline-name">${esc(attr.name)}</span>`];
          if (attr.role) parts.push(`<span class="byline-role">${esc(attr.role)}</span>`);
          if (attr.team) {
            parts.push('<span class="byline-sep">·</span>');
            parts.push(`<button class="byline-team" data-team="${esc(attr.team)}">${esc(attr.team)}</button>`);
          }
          thumbContent += `<div class="byline">${parts.join('')}</div>`;
        }
      } else {
        thumbContent = `<p class="entry-thumb-fallback">${esc(s.description || s.title || '')}</p>`;
      }

      return `
        <a class="entry" href="archive/${encodeURIComponent(s.id)}/index.html">
          <div class="entry-thumb">${thumbContent}</div>
          <div class="entry-body">
            <p class="entry-title">${state.query ? hl(s.title || 'untitled', state.query) : esc(s.title || 'untitled')}</p>
            ${s.description ? `<p class="entry-desc">${state.query ? hl(s.description, state.query) : esc(s.description)}</p>` : ''}
            <p class="entry-meta">${meta.join(' · ')}</p>
            ${sn ? `<div class="snippet">${hl(sn, state.query)}</div>` : ''}
          </div>
        </a>`;
    }).join('');

    // Wire up team pill clicks (stop propagation so clicking team doesn't open the card)
    els.results.querySelectorAll('.byline-team').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        state.activeTeam = btn.dataset.team;
        renderAll();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
    els.results.querySelectorAll('.tag').forEach(btn => {
      btn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        state.activeTag = btn.dataset.tag;
        renderAll();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }
  function renderFilters() {
    const hosts = Array.from(new Set(state.spaces.map(s => s.host).filter(Boolean))).sort();
    const tagsSet = new Set();
    state.spaces.forEach(s => (s.tags || []).forEach(t => tagsSet.add(t)));
    const tags = Array.from(tagsSet).sort();
    function chipBtn(label, isActive, data) {
      return `<button class="chip ${isActive ? 'active' : ''}" ${data}>${esc(label)}</button>`;
    }
    const sep = '<span class="chip-sep">·</span>';
    let html = chipBtn('all hosts', !state.activeHost, 'data-host=""');
    hosts.forEach(h => { html += sep + chipBtn('@' + h, state.activeHost === h, 'data-host="' + esc(h) + '"'); });
    html += '<br>' + chipBtn('all topics', !state.activeTag, 'data-tag=""');
    tags.forEach(t => { html += sep + chipBtn(t, state.activeTag === t, 'data-tag="' + esc(t) + '"'); });
    els.filters.innerHTML = html;
    els.filters.querySelectorAll('.chip').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.host !== undefined) state.activeHost = btn.dataset.host || null;
        if (btn.dataset.tag !== undefined) state.activeTag = btn.dataset.tag || null;
        renderAll();
      });
    });
  }
  function buildIndex() {
    state.index = lunr(function() {
      this.ref('id'); this.field('title', { boost: 3 });
      this.field('description', { boost: 2 });
      this.field('host', { boost: 2 }); this.field('transcript');
      state.spaces.forEach(s => {
        this.add({ id: s.id, title: s.title || '', description: s.description || '', host: s.host || '', transcript: s._transcript || '' });
      });
    });
  }
  function renderAll() {
    renderActiveFilters();
    renderFilters();
    render();
  }
  async function load() {
    try {
      const resp = await fetch('spaces.json');
      const data = await resp.json();
      state.spaces = data.spaces || [];
      buildIndex();
      renderAll();
    } catch (e) {
      els.results.innerHTML = '<div class="empty">could not load spaces.json — run scripts/build_manifest.py</div>';
      els.count.textContent = '';
    }
  }
  els.search.addEventListener('input', e => { state.query = e.target.value; render(); });
  load();
})();
</script>
</body>
</html>
